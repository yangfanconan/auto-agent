# Auto-Agent 配置文件 (v2.0)

# 基本配置
name: auto-agent
version: 2.0.0
workspace: ""

# Opencode 配置
opencode:
  enabled: true
  path: ""
  timeout: 300
  max_retries: 3

# Qwen 配置
qwen:
  enabled: true
  path: ""
  timeout: 300
  max_retries: 3
  model: ""

# Git 配置
git:
  auto_commit: true
  auto_push: false
  branch_prefix: feature

# 测试配置
test:
  auto_test: true
  coverage_threshold: 90.0
  test_framework: pytest
  timeout: 600

# 环境配置
environment:
  python_version: "3.13"
  node_version: "22"
  auto_install: true

# 日志配置
log:
  level: INFO
  save_json: true

# WebSocket 配置
websocket:
  enabled: true
  host: "0.0.0.0"
  port: 8765
  heartbeat_interval: 30.0

# 控制台 IO 配置
console_io:
  enabled: true
  capture_input: true
  capture_output: true
  capture_error: true
  keep_original: true
