# Auto-Agent 配置文件 (v2.0 增强版)

# 基本配置
name: auto-agent
version: 2.0.0
workspace: ""  # 空表示使用当前目录

# Opencode 配置
opencode:
  enabled: true
  path: ""  # 空表示自动检测
  timeout: 300  # 超时时间（秒）
  max_retries: 3  # 最大重试次数

# Qwen 配置
qwen:
  enabled: true
  path: ""  # 空表示自动检测
  timeout: 300
  max_retries: 3
  model: ""  # 空表示使用默认模型

# Git 配置
git:
  auto_commit: true
  auto_push: false
  branch_prefix: feature
  commit_template: "{type}: {description}"
  smart_commit: true

# 测试配置
test:
  auto_test: true
  coverage_threshold: 90.0
  test_framework: pytest
  timeout: 600
  auto_fix: true

# 环境配置
environment:
  python_version: "3.13"
  node_version: "22"
  auto_install: true
  check_ports: true
  venv:
    auto_create: true
    path: ".venv"

# 日志配置
log:
  level: INFO
  save_json: true
  max_file_size: 10485760
  backup_count: 5

# UI 配置
ui:
  theme: default
  rich_output: true
  progress_bar: true

# WebSocket 配置
websocket:
  enabled: true
  host: "0.0.0.0"
  port: 8765
  heartbeat_interval: 30.0

# 控制台 IO 配置
console_io:
  enabled: true
  capture_input: true
  capture_output: true
  capture_error: true
  keep_original: true  # 保留原始控制台输出

# 工具调度配置
scheduler:
  auto_retry: true
  max_retries: 3
  retry_delay: 1.0
  parallel_execution: false
  state_decision:
    # 状态决策规则
    on_error: "retry"  # retry/notify_user/stop
    on_waiting: "notify_user"  # notify_user/auto_continue
    on_running: "log"  # log/notify_user

# 知识库配置
knowledge:
  auto_index: true
  index_patterns:
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
