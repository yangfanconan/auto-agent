<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Agent v2.0 - 可视化智能编程助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo .version {
            background: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #00ff88;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #00ff88;
        }

        .status-indicator.disconnected {
            background: #ff4757;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 18px;
            color: #00d9ff;
        }

        .tool-status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .tool-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .tool-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .tool-card .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .tool-card .status.idle { background: #4a69bd; color: white; }
        .tool-card .status.running { background: #00d9ff; color: #000; }
        .tool-card .status.waiting { background: #ffa502; color: #000; }
        .tool-card .status.error { background: #ff4757; color: white; }
        .tool-card .status.stopped { background: #666; color: white; }

        .console-output {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .console-line {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
        }

        .console-line.output { color: #00ff88; }
        .console-line.error { color: #ff4757; background: rgba(255, 71, 87, 0.1); }
        .console-line.input { color: #00d9ff; }
        .console-line.status { color: #ffa502; }
        .console-line.tool { color: #a55eea; }

        .input-area {
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input, .input-group select {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #eee;
            font-size: 14px;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: #333;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .task-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item .task-info {
            flex: 1;
        }

        .task-item .task-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .task-item .task-desc {
            font-size: 12px;
            color: #888;
        }

        .task-item .task-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .task-status.pending { background: #4a69bd; color: white; }
        .task-status.running { background: #00d9ff; color: #000; }
        .task-status.completed { background: #00ff88; color: #000; }
        .task-status.failed { background: #ff4757; color: white; }
        .task-status.waiting_user { background: #ffa502; color: #000; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #ffa502;
        }

        .modal p {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .timestamp {
            font-size: 11px;
            color: #666;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>🤖 Auto-Agent</h1>
                <span class="version">v2.0</span>
            </div>
            <div class="connection-status">
                <div class="status-indicator" id="wsStatus"></div>
                <span id="wsStatusText">未连接</span>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="statTotal">0</div>
                <div class="label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statCompleted">0</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statFailed">0</div>
                <div class="label">失败</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statPending">0</div>
                <div class="label">等待中</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- 工具状态面板 -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">🛠️ 工具状态</h2>
                </div>
                <div class="tool-status-grid">
                    <div class="tool-card">
                        <h3>🧠 Qwen</h3>
                        <div class="status idle" id="qwenStatus">IDLE</div>
                    </div>
                    <div class="tool-card">
                        <h3>⚡ OpenCode</h3>
                        <div class="status idle" id="opencodeStatus">IDLE</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="refreshToolStatus()">刷新状态</button>
                </div>
            </div>

            <!-- 当前任务 -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">📊 任务进度</h2>
                </div>
                <div id="currentTaskInfo">
                    <p style="color: #666; text-align: center; padding: 40px 0;">暂无正在执行的任务</p>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="taskProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 控制台输出 -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">📝 控制台输出</h2>
                <button class="btn btn-secondary" onclick="clearConsole()">清空</button>
            </div>
            <div class="console-output" id="consoleOutput">
                <div class="console-line status">[系统] Auto-Agent v2.0 已启动...</div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="panel" style="margin-top: 20px;">
            <div class="panel-header">
                <h2 class="panel-title">📋 任务列表</h2>
                <button class="btn btn-secondary" onclick="loadTasks()">刷新</button>
            </div>
            <div class="task-list" id="taskList">
                <p style="color: #666; text-align: center; padding: 40px 0;">暂无任务</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="panel input-area">
            <div class="panel-header">
                <h2 class="panel-title">🚀 新建任务</h2>
            </div>
            <div class="input-group">
                <select id="toolSelect">
                    <option value="auto">🤖 自动选择</option>
                    <option value="opencode">⚡ OpenCode</option>
                    <option value="qwen">🧠 Qwen</option>
                </select>
                <input type="text" id="taskInput" placeholder="输入任务描述，例如：用 Python 写一个快速排序" />
                <button class="btn btn-primary" onclick="createTask()">执行任务</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2>⚠️ 需要确认</h2>
            <p id="confirmMessage">操作内容...</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="confirmAction(false)">取消</button>
                <button class="btn btn-primary" onclick="confirmAction(true)">确认</button>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 连接
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // 状态
        const state = {
            tasks: [],
            toolStatus: {
                qwen: 'IDLE',
                opencode: 'IDLE'
            },
            currentPlan: null
        };

        // 心跳检测
        let heartbeatInterval = null;

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }

        // 初始化 WebSocket
        function connectWebSocket() {
            const host = window.location.hostname || 'localhost';
            const wsUrl = `ws://${host}:8765`;
            console.log('连接 WebSocket:', wsUrl);

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket 连接成功');
                    updateConnectionStatus('connected');
                    reconnectAttempts = 0;
                    state.connected = true;
                    addConsoleLine('WebSocket 连接成功', 'status');
                    startHeartbeat();
                };

                ws.onclose = (event) => {
                    console.log('WebSocket 连接关闭', event.code, event.reason);
                    updateConnectionStatus('disconnected');
                    state.connected = false;
                    stopHeartbeat();

                    if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        const delay = Math.min(3000 * reconnectAttempts, 15000);
                        addConsoleLine(`将在 ${delay/1000} 秒后重连...`, 'status');
                        setTimeout(() => {
                            console.log(`尝试重连 (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                            connectWebSocket();
                        }, delay);
                    } else {
                        addConsoleLine('WebSocket 重连失败，请刷新页面', 'error');
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                    addConsoleLine('WebSocket 连接错误，请检查服务器是否运行', 'error');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (e) {
                        console.error('解析消息失败:', e, event.data);
                    }
                };
            } catch (e) {
                console.error('创建 WebSocket 失败:', e);
                addConsoleLine(`创建 WebSocket 失败: ${e.message}`, 'error');
            }
        }

        // 处理消息
        function handleMessage(data) {
            try {
                console.log('收到消息:', data);

                switch (data.type) {
                    case 'pong':
                        // 心跳响应，忽略
                        break;
                    case 'system':
                        if (data.event === 'connected') {
                            addConsoleLine(`已连接到服务器 (ID: ${data.data?.ws_id || 'unknown'})`, 'status');
                        }
                        break;

                    case 'io':
                        handleIOMessage(data);
                        break;

                    case 'task':
                        handleTaskEvent(data);
                        break;

                    case 'tool':
                        handleToolEvent(data);
                        break;

                    case 'decision':
                        handleDecisionEvent(data);
                        break;

                    case 'ack':
                        addConsoleLine(`操作确认：${data.data?.command || '完成'}`, 'status');
                        break;
                }
            } catch (e) {
                console.error('处理消息错误:', e, data);
            }
        }
        
        // 处理决策事件
        function handleDecisionEvent(data) {
            const { event, data: payload } = data;
            if (event === 'decision.made') {
                const decision = payload.result || payload;
                addConsoleLine(`决策: ${decision.decision_type || 'unknown'} - ${decision.reason || ''}`, 'status');
            }
        }

        // 处理 IO 消息
        function handleIOMessage(data) {
            try {
                const { event, data: payload } = data;
                let content = payload?.content || '';
                let type = 'output';

                switch (event) {
                    case 'input':
                        type = 'input';
                        break;
                    case 'error':
                        type = 'error';
                        break;
                    case 'status':
                        type = 'status';
                        break;
                    case 'tool_output':
                        type = 'tool';
                        break;
                }

                if (content) {
                    addConsoleLine(content, type);
                }
            } catch (e) {
                console.error('处理 IO 消息错误:', e);
            }
        }

        // 处理任务事件
        function handleTaskEvent(data) {
            if (!data) return;
            
            const { event, data: payload } = data;
            if (!event) return;
            
            const safePayload = payload || {};

            switch (event) {
                case 'task.started':
                    addConsoleLine(`任务开始：${safePayload.name || safePayload.id || '未知任务'}`, 'status');
                    // 更新当前任务显示
                    updateCurrentTask(safePayload);
                    break;

                case 'task.completed':
                    addConsoleLine(`任务完成：${safePayload.name || '任务'}`, 'output');
                    updateStats();
                    loadTasks();
                    break;

                case 'task.failed':
                    const taskName = safePayload.task?.name || safePayload.name || '任务';
                    const taskError = safePayload.task?.error || safePayload.error || '未知错误';
                    addConsoleLine(`任务失败：${taskName} - ${taskError}`, 'error');
                    updateStats();
                    loadTasks();
                    break;

                case 'task.submitted':
                    addConsoleLine(`任务已提交：${safePayload.task_id || '未知ID'}`, 'status');
                    break;

                case 'plan.submitted':
                    state.currentPlan = safePayload;
                    const tasks = safePayload.tasks || [];
                    const taskCount = Array.isArray(tasks) ? tasks.length : 0;
                    addConsoleLine(`任务计划已提交：${safePayload.name || '计划'} (${taskCount} 个子任务)`, 'status');
                    if (safePayload.tasks && safePayload.progress !== undefined) {
                        updateTaskProgress(safePayload);
                    }
                    break;
            }
        }

        // 处理工具事件
        function handleToolEvent(data) {
            if (!data) return;
            
            const { event, data: payload } = data;
            if (!event) return;
            
            const safePayload = payload || {};

            if (event === 'tool.status_changed') {
                const toolName = safePayload.tool_name || safePayload.name || 'unknown';
                const status = safePayload.status || safePayload.new_status || 'IDLE';
                updateToolStatus(toolName, status);
            }
        }

        // 更新工具状态
        function updateToolStatus(tool, status) {
            if (!tool) {
                console.log('工具名称为空');
                return;
            }

            const statusMap = {
                'qwen': 'qwenStatus',
                'opencode': 'opencodeStatus'
            };

            const toolKey = typeof tool === 'string' ? tool.toLowerCase() : String(tool);
            const elementId = statusMap[toolKey];
            if (!elementId) {
                console.log('未知工具:', tool);
                return;
            }

            const element = document.getElementById(elementId);
            if (!element) return;

            const statusText = status || 'IDLE';
            const statusClass = typeof statusText === 'string' ? statusText.toLowerCase() : String(statusText);
            element.textContent = statusText;
            element.className = `status ${statusClass}`;

            state.toolStatus[tool] = statusText;
        }
        // 更新连接状态
        function updateConnectionStatus(status) {
            const indicator = document.getElementById('wsStatus');
            const text = document.getElementById('wsStatusText');

            indicator.className = `status-indicator ${status}`;
            text.textContent = status === 'connected' ? '已连接' : '未连接';
        }

        // 添加控制台输出
        function addConsoleLine(content, type = 'output') {
            const consoleOutput = document.getElementById('consoleOutput');
            const line = document.createElement('div');
            line.className = `console-line ${type}`;

            const timestamp = new Date().toLocaleTimeString();
            line.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${escapeHtml(content)}`;

            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        // 转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空控制台
        function clearConsole() {
            document.getElementById('consoleOutput').innerHTML = '';
        }

        // 创建任务
        async function createTask() {
            const tool = document.getElementById('toolSelect').value;
            const input = document.getElementById('taskInput').value.trim();

            if (!input) {
                alert('请输入任务描述');
                return;
            }

            // 禁用按钮，显示加载状态
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '提交中...';
            btn.disabled = true;

            addConsoleLine(`创建任务：${input}`, 'input');

            try {
                // 通过 WebSocket 发送
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'command',
                        command: input,
                        tool: tool === 'auto' ? undefined : tool
                    }));
                    addConsoleLine('任务已通过 WebSocket 提交', 'status');
                } else {
                    // 降级：使用 HTTP API
                    const response = await fetch('/api/tasks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            description: input,
                            tool: tool === 'auto' ? 'opencode' : tool
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        addConsoleLine(`任务已提交：${result.task_id || '成功'}`, 'status');
                        // 刷新任务列表
                        setTimeout(loadTasks, 500);
                    } else {
                        const error = await response.text();
                        throw new Error(error || '提交失败');
                    }
                }

                document.getElementById('taskInput').value = '';
            } catch (e) {
                addConsoleLine(`提交任务失败：${e.message}`, 'error');
            } finally {
                // 恢复按钮状态
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 加载任务
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                if (response.ok) {
                    const tasks = await response.json();
                    if (Array.isArray(tasks)) {
                        renderTaskList(tasks);
                        state.tasks = tasks;
                        updateStats();
                    } else if (tasks && Array.isArray(tasks.tasks)) {
                        renderTaskList(tasks.tasks);
                        state.tasks = tasks.tasks;
                        updateStats();
                    }
                }
            } catch (e) {
                console.log('加载任务失败:', e);
            }
        }

        // 渲染任务列表
        function renderTaskList(tasks) {
            const taskList = document.getElementById('taskList');

            if (!tasks || tasks.length === 0) {
                taskList.innerHTML = '<p style="color: #666; text-align: center; padding: 40px 0;">暂无任务</p>';
                return;
            }

            taskList.innerHTML = tasks.slice(-20).reverse().map(task => `
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-name">${escapeHtml(task.name)}</div>
                        <div class="task-desc">${escapeHtml(task.description)}</div>
                    </div>
                    <div class="task-status ${task.status}">${task.status}</div>
                </div>
            `).join('');
        }

        // 更新任务进度
        function updateTaskProgress(plan) {
            if (!plan) return;

            const taskInfo = document.getElementById('currentTaskInfo');
            const progressBar = document.getElementById('taskProgress');

            if (!taskInfo || !progressBar) return;

            const tasks = plan.tasks || [];
            const taskCount = Array.isArray(tasks) ? tasks.length : 0;
            const progress = (plan.progress !== undefined && plan.progress !== null) ? plan.progress : 0;

            taskInfo.innerHTML = `
                <div style="margin-bottom: 10px;">
                    <strong>${escapeHtml(plan.name || '当前任务')}</strong>
                </div>
                <div style="font-size: 12px; color: #888;">
                    ${taskCount} 个子任务 | 进度：${typeof progress === 'number' ? progress.toFixed(1) : progress}%
                </div>
            `;

            progressBar.style.width = `${progress}%`;
        }
        
        // 更新当前任务显示
        function updateCurrentTask(task) {
            if (!task) return;
            
            const taskInfo = document.getElementById('currentTaskInfo');
            const progressBar = document.getElementById('taskProgress');

            taskInfo.innerHTML = `
                <div style="margin-bottom: 10px;">
                    <strong>${escapeHtml(task.name || task.description || '执行中任务')}</strong>
                </div>
                <div style="font-size: 12px; color: #888;">
                    工具: ${task.tool_name || 'auto'} | 状态: ${task.status || 'running'}
                </div>
            `;

            progressBar.style.width = `50%`;
        }

        // 更新统计
        function updateStats() {
            const tasks = state.tasks || [];
            const total = tasks.length;
            const completed = tasks.filter(t => t && t.status === 'completed').length;
            const failed = tasks.filter(t => t && t.status === 'failed').length;
            const pending = tasks.filter(t => t && t.status === 'pending').length;
            const running = tasks.filter(t => t && t.status === 'running').length;

            const statTotal = document.getElementById('statTotal');
            const statCompleted = document.getElementById('statCompleted');
            const statFailed = document.getElementById('statFailed');
            const statPending = document.getElementById('statPending');

            if (statTotal) statTotal.textContent = total;
            if (statCompleted) statCompleted.textContent = completed;
            if (statFailed) statFailed.textContent = failed;
            if (statPending) statPending.textContent = pending;
        }

        // 刷新工具状态
        async function refreshToolStatus() {
            if (!state.connected) {
                console.log('WebSocket 未连接，跳过刷新');
                return;
            }
            try {
                const response = await fetch('/api/tools/status');
                if (response.ok) {
                    const status = await response.json();
                    if (status) {
                        updateToolStatus('qwen', status.qwen || 'IDLE');
                        updateToolStatus('opencode', status.opencode || 'IDLE');
                    }
                }
            } catch (e) {
                console.log('刷新状态失败:', e);
            }
        }

        // 确认操作
        let currentConfirmCallback = null;

        function showConfirm(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
            currentConfirmCallback = callback;
        }

        function confirmAction(confirmed) {
            if (currentConfirmCallback) {
                currentConfirmCallback(confirmed);
            }
            document.getElementById('confirmModal').classList.remove('active');
            currentConfirmCallback = null;
        }

        // 回车提交
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                createTask();
            }
        });

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            loadTasks();

            // 定期刷新（仅在连接状态下）
            setInterval(() => {
                if (state.connected) {
                    loadTasks();
                    refreshToolStatus();
                }
            }, 10000);  // 10秒刷新一次
        });

        // 页面可见性变化时刷新
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.connected) {
                loadTasks();
                refreshToolStatus();
            }
        });
    </script>
</body>
</html>
